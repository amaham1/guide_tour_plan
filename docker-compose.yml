services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      OSRM_BASE_URL: http://osrm:5000
      DATABASE_URL: file:./prisma/dev.db
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - osrm

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run worker:run-all
    env_file:
      - .env
    environment:
      OSRM_BASE_URL: http://osrm:5000
      DATABASE_URL: file:./prisma/dev.db
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - osrm

  osrm:
    image: ghcr.io/project-osrm/osrm-backend:latest
    command: osrm-routed --algorithm mld /data/jeju-latest.osrm
    ports:
      - "5000:5000"
    volumes:
      - ./docker/osrm:/data
